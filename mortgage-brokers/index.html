/* ── NAV (top brand bar) ─────────────────────────────────── */
.nav {

  margin-bottom: 40px;
  letter-spacing: -0.005em;
}

/* ── VIDEO ───────────────────────────────────────────────── */
.video-wrap {
  position: relative;
  width: 100%;
  max-width: 880px;
  margin: 0 auto 36px;
  aspect-ratio: 16 / 9;
  background: #000;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.video-wrap iframe,
.video-wrap video {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}

/* ── CTA ─────────────────────────────────────────────────── */
.cta {

  color: #FFFFFF;
  padding: 18px 56px;
  font-size: 17px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.005em;
  border-radius: 8px;
  text-decoration: none;
  transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  /* iOS Safari sometimes pads links — kill it */
  -webkit-touch-callout: none;
}
@media (hover: hover) {
  .cta:hover {
    background: var(--green-deep);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(52, 209, 126, 0.28);
  }
}
.cta:active {

}
